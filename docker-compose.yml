services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    volumes:
      - receipt_data:/data
    environment:
      - OLLAMA_URL=http://arcturus:11434
      - OLLAMA_MODEL=llama3.2-vision:11b
      - DATABASE_URL=sqlite:////data/receipts.db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  receipt_data:
